<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Moodle Scraper</title>
<style>
  :root { --bg:#f7f9fb; --fg:#0f1b2a; --muted:#5c6b7a; --accent:#0c7a8a; --accent-2:#0aa1b8; --card:#fff; --border:#e3e8ee; }
  * { box-sizing: border-box; }
  body { width: 380px; margin:0; font-family: -apple-system, system-ui, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--fg); }
  header { padding: 14px 16px; background: linear-gradient(135deg, var(--accent), var(--accent-2)); color:#fff; }
  header h1 { margin:0; font-size: 15px; font-weight:600; }
  header p { margin:2px 0 0; font-size: 11px; opacity:.85; }
  .controls { padding: 12px 16px; display:flex; gap:8px; align-items:center; border-bottom:1px solid var(--border); background:#fff; }
  button { font: inherit; cursor: pointer; border-radius: 6px; border: 1px solid var(--border); background: #fff; padding: 7px 10px; font-size: 12px; color: var(--fg); }
  button.primary { background: var(--accent); color:#fff; border-color: var(--accent); font-weight: 600; }
  button.primary:hover { background: var(--accent-2); }
  button:disabled { opacity: .5; cursor: not-allowed; }
  .mode { display:flex; gap:6px; align-items:center; font-size:11px; color:var(--muted); margin-left:auto; }
  .status { padding: 8px 16px; font-size: 11px; color: var(--muted); min-height: 24px; }
  .tabs { display:flex; border-bottom:1px solid var(--border); background:#fff; }
  .tab { flex:1; padding: 9px 4px; text-align:center; font-size: 11px; cursor:pointer; color: var(--muted); border-bottom: 2px solid transparent; }
  .tab.active { color: var(--accent); border-color: var(--accent); font-weight:600; }
  .tab .count { display:inline-block; background:#eef3f6; color: var(--muted); border-radius: 10px; padding: 1px 6px; margin-left: 4px; font-size:10px; }
  .tab.active .count { background: var(--accent); color:#fff; }
  .list { max-height: 360px; overflow:auto; padding: 4px 0; background: var(--bg); }
  .item { padding: 8px 16px; border-bottom: 1px solid var(--border); font-size: 12px; }
  .item a { color: var(--accent); text-decoration: none; word-break: break-word; }
  .item a:hover { text-decoration: underline; }
  .item .meta { font-size: 10px; color: var(--muted); margin-top:2px; }
  .item .body { white-space: pre-wrap; color: var(--fg); }
  .empty { padding: 24px 16px; text-align:center; color: var(--muted); font-size: 12px; }
  footer { display:flex; gap:8px; padding: 10px 16px; border-top:1px solid var(--border); background:#fff; }
  footer button { flex:1; }
  .hint { font-size: 10px; color: var(--muted); padding: 6px 16px 10px; background:#fff; }
</style>
</head>
<body>
  <header>
    <h1>Moodle Content Scraper</h1>
    <p>Open a Moodle page, then scrape & categorize.</p>
  </header>
  <div class="controls">
    <button id="scrape" class="primary">Scrape this page</button>
    <label class="mode"><input type="checkbox" id="selectionOnly" /> selection only</label>
  </div>
  <div class="hint">Tip: select text on the page first, then check "selection only" to scrape just that region.</div>
  <div class="status" id="status">Ready.</div>
  <div class="tabs">
    <div class="tab active" data-tab="text">Text <span class="count" id="c-text">0</span></div>
    <div class="tab" data-tab="videos">Videos <span class="count" id="c-videos">0</span></div>
    <div class="tab" data-tab="documents">Docs <span class="count" id="c-documents">0</span></div>
    <div class="tab" data-tab="links">Links <span class="count" id="c-links">0</span></div>
  </div>
  <div class="list" id="list"><div class="empty">No content scraped yet.</div></div>
  <footer>
    <button id="copy">Copy JSON</button>
    <button id="download">Download .json</button>
  </footer>
  <script src="popup.js"></script>
</body>
</html>
